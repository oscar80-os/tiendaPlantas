<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de cursos</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>body{font-family:Arial,sans-serif;margin:0;background:#f6f8f6}header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}main{display:grid;grid-template-columns:2fr 1fr;gap:24px;padding:24px;max-width:1280px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}.course-card,.cart-box{background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.06);overflow:hidden}.course-card img{width:100%;height:180px;object-fit:cover}.course-body{padding:16px}.course-body button,.checkout-btn,.logout-btn,.link-btn{padding:10px 14px;border:none;border-radius:10px;background:#2e7d32;color:#fff;cursor:pointer;text-decoration:none;display:inline-block}.cart-box{padding:18px}.cart-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #eee}@media(max-width:900px){main{grid-template-columns:1fr}}</style>
</head>
<body>
  <header>
    <div>
      <strong>Catálogo de cursos</strong>
      <div id="user-email"></div>
    </div>
    <div>
      <a class="link-btn" href="mis-cursos.html">Mis cursos</a>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </header>
  <main>
    <section>
      <div id="courses-grid" class="grid"></div>
    </section>
    <aside class="cart-box">
      <h3>Carrito <span id="mini-cart-count">0</span></h3>
      <div id="mini-cart"></div>
      <p>Total: <strong id="mini-cart-total">$0</strong></p>
      <button class="checkout-btn" onclick="goCheckout()">Pagar con Nequi</button>
    </aside>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/courses.js"></script>
</body>
</html>
