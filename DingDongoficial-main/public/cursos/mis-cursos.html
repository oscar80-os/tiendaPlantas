<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis cursos</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>body{font-family:Arial,sans-serif;background:#f6f8f6;margin:0}.wrap{max-width:1100px;margin:24px auto;padding:0 20px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}.course-card{background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.06);overflow:hidden}.course-card img{width:100%;height:180px;object-fit:cover}.course-body{padding:16px}.btn{padding:10px 14px;border-radius:10px;background:#2e7d32;color:#fff;text-decoration:none;display:inline-block}</style>
</head>
<body>
  <div class="wrap">
    <h1>Mis cursos</h1>
    <div id="my-courses" class="grid"></div>
  </div>
  <script src="js/my-courses.js"></script>
</body>
</html>
