<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Automatización Comercial</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1200px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07)}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:140px}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}.full{grid-column:1/-1}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="grid"><div class="card"><h1>Crear plantilla</h1><select id="tipo"><option value="whatsapp">WhatsApp</option><option value="correo">Correo</option><option value="seguimiento">Seguimiento rápido</option></select><input id="nombre" placeholder="Nombre interno"><input id="asunto" placeholder="Asunto"><textarea id="contenido" placeholder="Usa variables como {{nombre}}, {{curso}}, {{telefono}}, {{correo}}"></textarea><button id="save-btn">Guardar plantilla</button><div id="form-message" class="msg"></div></div><div class="card"><h2>Editar</h2><input id="edit-id" type="hidden"><select id="edit-tipo"><option value="whatsapp">WhatsApp</option><option value="correo">Correo</option><option value="seguimiento">Seguimiento rápido</option></select><input id="edit-nombre"><input id="edit-asunto"><textarea id="edit-contenido"></textarea><button id="update-btn">Actualizar</button> <button id="delete-btn">Eliminar</button><div id="edit-message" class="msg"></div></div><div class="card full"><h2>Plantillas</h2><div id="templates-list"></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-automatizaciones.js"></script></body></html>
