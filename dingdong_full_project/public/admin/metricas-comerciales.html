<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Métricas Comerciales</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.wrap{max-width:1300px;margin:24px auto;padding:0 20px}.kpis,.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(5,1fr)}.grid{grid-template-columns:1fr 1fr}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07)}.val{font-size:28px;font-weight:bold;color:#2e7d32}.chart{height:320px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}@media(max-width:1000px){.kpis,.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1 style="color:#2e7d32">Métricas Comerciales</h1><div class="kpis"><div class="card"><div>Leads nuevos</div><div id="kpiLeadsNuevos" class="val">0</div></div><div class="card"><div>Leads convertidos</div><div id="kpiLeadsConvertidos" class="val">0</div></div><div class="card"><div>Valor total cotizado</div><div id="kpiValorCotizado" class="val">$0</div></div><div class="card"><div>Cotizaciones aceptadas</div><div id="kpiCotAceptadas" class="val">0</div></div><div class="card"><div>Tasa de conversión</div><div id="kpiConversion" class="val">0%</div></div></div><div class="grid"><div class="card"><div class="chart"><canvas id="chartLeads"></canvas></div></div><div class="card"><div class="chart"><canvas id="chartCotizaciones"></canvas></div></div><div class="card"><table><thead><tr><th>Interés</th><th>Leads</th><th>Convertidos</th><th>Conversión</th></tr></thead><tbody id="tablaIntereses"></tbody></table></div><div class="card"><table><thead><tr><th>Estado</th><th>Cantidad</th><th>Valor</th></tr></thead><tbody id="tablaCotizaciones"></tbody></table></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-metricas-comerciales.js"></script></body></html>
