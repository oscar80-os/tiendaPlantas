<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin WhatsApp</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07);max-width:900px;margin:24px auto}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}.btn{padding:12px 16px;border:none;border-radius:10px;background:#2e7d32;color:#fff;font-weight:bold}.message{display:none;padding:10px;border-radius:10px}.message.success,.message.error{display:block}.message.success{background:#e8f5e9;color:#2e7d32}.message.error{background:#ffebee;color:#c62828}</style></head><body><div class="card"><h1>Configurar WhatsApp</h1><select id="activo"><option value="true">Activo</option><option value="false">Inactivo</option></select><input id="numero" placeholder="573136254423"><input id="etiqueta" placeholder="¿Necesitas ayuda?"><input id="textoBoton" placeholder="Escríbenos por WhatsApp"><textarea id="mensaje" placeholder="Hola, quiero información sobre los cursos."></textarea><button id="save-btn" class="btn">Guardar configuración</button><div id="form-message" class="message"></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-whatsapp.js"></script></body></html>
