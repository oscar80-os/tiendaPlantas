<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Agenda Comercial</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.grid{display:grid;grid-template-columns:1fr 1.2fr;gap:24px;max-width:1200px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07)}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:100px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="grid"><div><div class="card"><h1>Crear seguimiento</h1><input id="leadEmail" placeholder="Correo del lead"><input id="titulo" placeholder="Título"><select id="tipo"><option>Llamada</option><option>WhatsApp</option><option>Correo</option><option>Reunión</option><option>Seguimiento</option></select><input id="fecha" type="date"><input id="hora" type="time"><textarea id="detalle" placeholder="Detalle"></textarea><button id="save-btn">Guardar tarea</button><div id="form-message" class="msg"></div></div><div class="card"><h2>Editar</h2><input id="edit-id" type="hidden"><input id="edit-leadEmail" disabled><input id="edit-titulo"><select id="edit-tipo"><option>Llamada</option><option>WhatsApp</option><option>Correo</option><option>Reunión</option><option>Seguimiento</option></select><input id="edit-fecha" type="date"><input id="edit-hora" type="time"><select id="edit-estado"><option value="pendiente">Pendiente</option><option value="hecho">Hecho</option><option value="vencido">Vencido</option></select><textarea id="edit-detalle"></textarea><button id="update-btn">Actualizar</button> <button id="done-btn">Marcar hecho</button><div id="edit-message" class="msg"></div></div></div><div><div class="card"><h1>Tareas</h1><input id="search-email" placeholder="Correo"><select id="status-filter"><option value="">Todos</option><option value="pendiente">Pendiente</option><option value="hecho">Hecho</option><option value="vencido">Vencido</option></select><input id="date-filter" type="date"><button id="apply-filters-btn">Aplicar</button> <button id="clear-filters-btn">Limpiar</button><table><thead><tr><th>Lead</th><th>Tarea</th><th>Fecha</th><th>Estado</th><th></th></tr></thead><tbody id="agenda-body"></tbody></table></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-agenda.js"></script></body></html>
