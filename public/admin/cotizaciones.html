<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cotizaciones</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.grid{display:grid;grid-template-columns:1fr 1.15fr;gap:24px;max-width:1200px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07)}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:110px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="grid"><div><div class="card"><h1>Crear cotización</h1><input id="leadEmail" placeholder="Correo del lead"><input id="nombreLead" placeholder="Nombre del lead"><input id="titulo" placeholder="Título"><input id="producto" placeholder="Producto"><input id="valor" type="number" placeholder="Valor"><input id="vigencia" type="date"><select id="estado"><option value="borrador">Borrador</option><option value="enviada">Enviada</option><option value="aceptada">Aceptada</option><option value="rechazada">Rechazada</option></select><textarea id="detalle" placeholder="Detalle"></textarea><button id="save-btn">Guardar</button><div id="form-message" class="msg"></div></div><div class="card"><h2>Editar</h2><input id="edit-id" type="hidden"><input id="edit-leadEmail"><input id="edit-nombreLead"><input id="edit-titulo"><input id="edit-producto"><input id="edit-valor" type="number"><input id="edit-vigencia" type="date"><select id="edit-estado"><option value="borrador">Borrador</option><option value="enviada">Enviada</option><option value="aceptada">Aceptada</option><option value="rechazada">Rechazada</option></select><textarea id="edit-detalle"></textarea><button id="update-btn">Actualizar</button> <button id="accept-btn">Marcar aceptada</button><div id="edit-message" class="msg"></div></div></div><div><div class="card"><h1>Listado</h1><input id="search-email" placeholder="Correo"><select id="status-filter"><option value="">Todos</option><option value="borrador">Borrador</option><option value="enviada">Enviada</option><option value="aceptada">Aceptada</option><option value="rechazada">Rechazada</option></select><button id="apply-filters-btn">Aplicar</button> <button id="clear-filters-btn">Limpiar</button><table><thead><tr><th>Lead</th><th>Propuesta</th><th>Valor</th><th>Estado</th><th></th></tr></thead><tbody id="quotes-body"></tbody></table></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-cotizaciones.js"></script></body></html>
