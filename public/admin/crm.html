<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CRM</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.wrap{max-width:1400px;margin:24px auto;padding:0 20px}.board{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}.col{background:#eef2f0;border-radius:18px;padding:14px}.lead{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 6px 14px rgba(0,0,0,.06)}.panel{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07);margin-top:24px}input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:100px}.btn{padding:10px 14px;border:none;border-radius:10px;background:#2e7d32;color:#fff;font-weight:bold}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}@media(max-width:1100px){.board{grid-template-columns:1fr 1fr}}@media(max-width:800px){.board{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1 style="color:#2e7d32">CRM Comercial</h1><div class="board"><div class="col"><h3>Nuevo</h3><div id="col-nuevo"></div></div><div class="col"><h3>Contactado</h3><div id="col-contactado"></div></div><div class="col"><h3>Propuesta</h3><div id="col-propuesta"></div></div><div class="col"><h3>Convertido</h3><div id="col-convertido"></div></div><div class="col"><h3>Descartado</h3><div id="col-descartado"></div></div></div><div class="panel"><input id="edit-id" type="hidden"><input id="edit-nombre" disabled><input id="edit-correo" disabled><input id="edit-telefono" disabled><input id="edit-interes" disabled><select id="edit-etapa"><option value="nuevo">Nuevo</option><option value="contactado">Contactado</option><option value="propuesta">Propuesta</option><option value="convertido">Convertido</option><option value="descartado">Descartado</option></select><select id="edit-estado"><option value="nuevo">Nuevo</option><option value="contactado">Contactado</option><option value="convertido">Convertido</option><option value="descartado">Descartado</option></select><input id="edit-proximaAccion" placeholder="Próxima acción"><textarea id="edit-mensaje" disabled></textarea><textarea id="edit-notas" placeholder="Notas comerciales"></textarea><select id="template-select"><option value="">Selecciona una plantilla</option></select><textarea id="template-preview" readonly></textarea><button id="update-btn" class="btn">Guardar</button> <button id="copy-template-btn" class="btn">Copiar plantilla</button> <button id="open-whatsapp-btn" class="btn">Abrir WhatsApp</button><div id="edit-message" class="msg"></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-crm.js"></script></body></html>
