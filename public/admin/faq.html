<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Faq</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1200px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07)}input,textarea,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:120px}button{padding:10px 14px;border:none;border-radius:10px;background:#2e7d32;color:#fff;font-weight:bold}.full{grid-column:1/-1}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}</style></head><body><div class="grid"><div class="card"><h1>Admin Faq</h1><input id="nombre" placeholder="Nombre / título"><input id="meta" placeholder="Meta opcional"><input id="orden" type="number" placeholder="Orden"><textarea id="contenido" placeholder="Contenido"></textarea><button id="save-btn">Guardar</button><div id="form-message" class="msg"></div></div><div class="card"><h2>Editar</h2><input id="edit-id" type="hidden"><input id="edit-nombre"><input id="edit-meta"><input id="edit-orden" type="number"><textarea id="edit-contenido"></textarea><button id="update-btn">Actualizar</button> <button id="delete-btn" style="background:#c62828">Eliminar</button><div id="edit-message" class="msg"></div></div><div class="card full"><h2>Listado</h2><div id="list"></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-faq.js"></script></body></html>
