<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Leads</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f5f7f5}.wrap{max-width:1200px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.07);margin-bottom:24px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}.msg{display:none;padding:10px;border-radius:10px}.msg.success,.msg.error{display:block}.msg.success{background:#e8f5e9;color:#2e7d32}.msg.error{background:#ffebee;color:#c62828}</style></head><body><div class="wrap"><div class="card"><h1>Prospectos</h1><input id="search-email" placeholder="Buscar por correo"><select id="status-filter"><option value="">Todos</option><option value="nuevo">Nuevo</option><option value="contactado">Contactado</option><option value="convertido">Convertido</option><option value="descartado">Descartado</option></select><button id="apply-filters-btn">Aplicar</button> <button id="clear-filters-btn">Limpiar</button> <button id="export-btn">Exportar CSV</button><table><thead><tr><th>Nombre</th><th>Correo</th><th>Interés</th><th>Estado</th><th></th></tr></thead><tbody id="leads-body"></tbody></table></div><div class="card"><h2>Gestionar</h2><input id="edit-id" type="hidden"><input id="edit-nombre" disabled><input id="edit-correo" disabled><input id="edit-telefono" disabled><input id="edit-interes" disabled><textarea id="edit-mensaje" disabled></textarea><select id="edit-estado"><option value="nuevo">Nuevo</option><option value="contactado">Contactado</option><option value="convertido">Convertido</option><option value="descartado">Descartado</option></select><button id="update-btn">Actualizar estado</button><div id="edit-message" class="msg"></div></div></div><script src="../js/firebase-config.js"></script><script src="../js/admin-leads.js"></script></body></html>
