<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Nequi</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>body{font-family:Arial,sans-serif;background:#f6f8f6;margin:0}.wrap{max-width:900px;margin:30px auto;padding:0 20px}.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06)}input,button{padding:12px;border-radius:10px;border:1px solid #ddd;width:100%;margin-top:10px}button{border:none;background:#2e7d32;color:#fff;cursor:pointer}.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}.secondary{display:inline-block;width:auto;text-decoration:none}</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Checkout de cursos</h1>
      <p>Este flujo crea una orden y luego inicia el pago con Nequi desde backend seguro.</p>
      <label>Número Nequi</label>
      <input id="nequi-phone" placeholder="3001234567" maxlength="10">
      <h3>Resumen</h3>
      <div id="order-summary"></div>
      <p>Total: <strong id="checkout-total">$0</strong></p>
      <button id="pay-btn" onclick="createOrderAndStartPayment()">Pagar con Nequi</button>
      <a id="go-courses-btn" class="secondary" href="mis-cursos.html" style="display:none;margin-top:16px;">Ir a mis cursos</a>
      <div id="payment-status" style="margin-top:18px;"></div>
    </div>
  </div>
  <script src="js/checkout.js"></script>
</body>
</html>
