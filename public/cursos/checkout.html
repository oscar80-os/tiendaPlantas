<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Wompi</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <style>body{font-family:Arial,sans-serif;background:#f6f8f6;margin:0}.wrap{max-width:900px;margin:30px auto;padding:0 20px}.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06)}input,button{padding:12px;border-radius:10px;border:1px solid #ddd;width:100%;margin-top:10px}button{border:none;background:#2e7d32;color:#fff;cursor:pointer}.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}.secondary{display:inline-block;width:auto;text-decoration:none}</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Checkout de cursos</h1>
      <p>Prepararemos tu orden y te enviaremos a Wompi. Allí el cliente podrá pagar con los métodos disponibles, incluido Nequi si está habilitado en tu comercio.</p>
      <label>Nombre completo</label>
      <input id="customer-name" placeholder="Nombre del comprador">
      <label>Celular</label>
      <input id="customer-phone" placeholder="3001234567" maxlength="10">
      <h3>Resumen</h3>
      <div id="order-summary"></div>
      <p>Total: <strong id="checkout-total">$0</strong></p>
      <button id="pay-btn" onclick="startWompiCheckout()">Continuar a Wompi</button>
      <p style="font-size:14px;color:#666;">Importante: la activación del curso se hace por webhook. La redirección de Wompi es solo informativa.</p>
    </div>
  </div>
  <script src="../js/checkout.js"></script>
  <script src="https://checkout.wompi.co/widget.js"></script>
</body>
</html>
