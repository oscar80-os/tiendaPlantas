<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso | Ding-Dong</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
    }
    header {
      background: white;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    video {
      width: 100%;
      max-height: 600px;
      border-radius: 12px;
      background: #000;
      margin-top: 20px;
    }
    .btn {
      display: inline-block;
      padding: 10px 16px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
    }
    .danger {
      background: #c62828;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h2 style="margin:0;">Área de curso</h2>
    </div>
    <div>
      <a class="btn" href="panel.html">Volver</a>
      <button class="btn danger" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h1 id="titulo">Cargando curso...</h1>
      <p id="descripcion"></p>

      <a id="material" class="btn" href="#" target="_blank" style="display:none;">Descargar material</a>

      <video id="video" controls controlsList="nodownload"></video>
    </div>
  </main>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/curso.js"></script>
</body>
</html>
