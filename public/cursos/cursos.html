<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursos | Ding-Dong</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    header {
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 18px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #2e7d32;
      color: white;
    }

    .btn-secondary {
      background: #455a64;
      color: white;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: #2e7d32;
      color: #fff;
      font-weight: bold;
      font-size: 13px;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px 40px;
    }

    .toolbar {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.07);
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #courses-list {
      min-height: 200px;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .course-card img {
      display: block;
    }

    @media (max-width: 768px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1 style="margin:0;color:#2e7d32;">Cursos Ding-Dong</h1>
        <p style="margin:4px 0 0;color:#6b7280;">Compra tu curso y accede desde tu cuenta.</p>
      </div>

      <div class="actions">
        <a href="/cursos/mis-cursos.html" class="btn btn-secondary">Mis cursos</a>
        <button id="logout-btn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="toolbar">
      <div class="toolbar-left">
        <button id="preview-cart" class="btn btn-secondary" type="button">Ver carrito</button>
        <button id="clear-cart" class="btn btn-secondary" type="button">Vaciar carrito</button>
      </div>

      <div class="toolbar-right">
        <span>Carrito:</span>
        <span id="cart-count" class="badge">0</span>
        <button id="go-checkout" class="btn btn-primary" type="button">Ir al checkout</button>
      </div>
    </section>

    <section id="courses-list">
      <p>Cargando cursos...</p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="https://checkout.wompi.co/widget.js"></script>
  <script src="../js/courses.js"></script>
</body>
</html>
