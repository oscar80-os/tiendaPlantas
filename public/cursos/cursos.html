<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de cursos | Ding-Dong</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    header {
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 18px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      color: #2e7d32;
    }

    .brand p {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #2e7d32;
      color: white;
    }

    .btn-secondary {
      background: #455a64;
      color: white;
    }

    .btn-danger {
      background: #c62828;
      color: white;
    }

    .cart-badge {
      background: #111827;
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    .container {
      max-width: 1180px;
      margin: 30px auto;
      padding: 0 20px 40px;
    }

    .intro {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      margin-bottom: 28px;
    }

    .intro h2 {
      margin-top: 0;
      color: #1f2937;
    }

    #courses-list {
      min-height: 120px;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <h1>Ding-Dong Cursos</h1>
        <p>Aprende con nuestros cursos y accede desde tu cuenta.</p>
      </div>

      <div class="actions">
        <span class="cart-badge">Carrito: <span id="cart-count">0</span></span>
        <button id="preview-cart" class="btn btn-secondary">Ver carrito</button>
        <button id="clear-cart" class="btn btn-secondary">Vaciar carrito</button>
        <button id="go-checkout" class="btn btn-primary">Ir al checkout</button>
        <a href="mis-cursos.html" class="btn btn-secondary">Mis cursos</a>
        <button id="logout-btn" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h2>Catálogo</h2>
      <p>Selecciona el curso que deseas comprar. Puedes agregar varios al carrito o comprar uno directamente.</p>
    </section>

    <section id="courses-list"></section>
  </main>

  <script src="../js/firebase-config.js"></script>
  <script src="https://checkout.wompi.co/widget.js"></script>
  <script src="../js/courses.js"></script>
  
</body>
</html>
