<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso a cursos | Ding-Dong</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 32px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 8px;
      color: #2e7d32;
      font-size: 30px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #6b7280;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: #e5e7eb;
      color: #374151;
    }

    .tab-btn.active {
      background: #2e7d32;
      color: white;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin-bottom: 16px;
      box-sizing: border-box;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background: #2e7d32;
      color: white;
    }

    .btn-secondary {
      background: #455a64;
      color: white;
      margin-top: 10px;
    }

    .link-btn {
      background: transparent;
      border: none;
      color: #2e7d32;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      margin-top: 12px;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      color: #455a64;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Acceso a cursos</h1>
    <p class="subtitle">Ingresa con tu cuenta o crea una nueva para comprar y ver tus cursos.</p>

    <div class="tabs">
      <button id="tab-login" class="tab-btn active" type="button">Ingresar</button>
      <button id="tab-register" class="tab-btn" type="button">Crear cuenta</button>
    </div>

    <form id="auth-form">
      <label for="name" id="label-name" style="display:none;">Nombre completo</label>
      <input id="name" type="text" placeholder="Tu nombre completo" style="display:none;" />

      <label for="email">Correo electrónico</label>
      <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" />

      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" />

      <button id="submit-btn" class="btn btn-primary" type="submit">Ingresar</button>
    </form>

    <button id="reset-password-btn" class="link-btn" type="button">
      ¿Olvidaste tu contraseña?
    </button>

    <div id="auth-message" class="message"></div>

    <a href="/index.html" class="back-link">← Volver a la página principal</a>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
