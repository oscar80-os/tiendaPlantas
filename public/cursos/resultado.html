<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado del pago | Ding-Dong</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 50px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .pending {
      background: #fff8e1;
      color: #b26a00;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin: 10px 0;
    }

    .details {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      background: #f8faf8;
      text-align: left;
    }

    .details p {
      margin: 8px 0;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #2e7d32;
      color: #fff;
    }

    .btn-secondary {
      background: #455a64;
      color: #fff;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="status-icon" class="icon pending">⏳</div>
      <h1 id="status-title">Verificando tu pago...</h1>
      <p id="status-message">
        Estamos esperando la confirmación del pago para activar tu curso.
      </p>

      <div class="details" id="payment-details" style="display:none;">
        <p><strong>Referencia:</strong> <span id="detail-reference">-</span></p>
        <p><strong>Transacción:</strong> <span id="detail-transaction">-</span></p>
        <p><strong>Estado:</strong> <span id="detail-status">-</span></p>
      </div>

      <div class="actions">
        <a href="/cursos/mis-cursos.html" class="btn btn-primary">Ir a mis cursos</a>
        <a href="/cursos/cursos.html" class="btn btn-secondary">Volver al catálogo</a>
      </div>

      <p class="small">
        Si tu pago fue aprobado y aún no ves tu curso, espera unos segundos y vuelve a revisar en Mis cursos.
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/result.js"></script>
</body>
</html>
