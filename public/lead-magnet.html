<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lead Magnet</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><style>body{font-family:Arial;margin:0;background:#f6f8f6}.wrap{max-width:1100px;margin:24px auto;padding:0 20px;display:grid;grid-template-columns:1fr .9fr;gap:24px}.hero,.card{background:#fff;border-radius:24px;padding:28px;box-shadow:0 10px 24px rgba(0,0,0,.07)}.hero{background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff}input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;margin-bottom:12px;box-sizing:border-box}textarea{min-height:90px}.btn{padding:12px 16px;border:none;border-radius:10px;background:#2e7d32;color:#fff;font-weight:bold}.message{display:none;padding:10px;border-radius:10px}.message.success,.message.error{display:block}.message.success{background:#e8f5e9;color:#2e7d32}.message.error{background:#ffebee;color:#c62828}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="hero"><h1>Recibe información exclusiva</h1><p>Déjanos tus datos y te contactaremos.</p></div><div class="card"><h2>Quiero recibir información</h2><input id="nombre" placeholder="Nombre completo"><input id="correo" placeholder="Correo"><input id="telefono" placeholder="Teléfono"><select id="interes"><option value="">Interés</option><option>Bisutería</option><option>Plantas de interior</option><option>Pintura de materas</option><option>Estantería en madera</option><option>Todos los cursos</option></select><textarea id="mensaje" placeholder="Mensaje opcional"></textarea><button id="save-btn" class="btn">Quiero recibir información</button><div id="form-message" class="message"></div></div></div><script src="./js/firebase-config.js"></script><script src="./js/leads.js"></script></body></html>
