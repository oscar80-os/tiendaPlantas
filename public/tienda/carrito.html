<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito | Ding-Dong</title>

  <style>
    :root {
      --verde: #2e7d32;
      --gris: #455a64;
      --fondo: #f5f7f5;
      --texto: #1f2937;
      --borde: #e5e7eb;
      --muted: #6b7280;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--fondo);
      color: var(--texto);
    }

    .topbar {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      padding: 18px 20px;
    }

    .topbar-inner {
      max-width: 1150px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      color: var(--verde);
      font-size: 30px;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--verde);
      color: white;
      font-weight: bold;
      font-size: 13px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary { background: var(--verde); color: white; }
    .btn-secondary { background: var(--gris); color: white; }
    .btn-danger { background: var(--danger); color: white; }

    .layout {
      max-width: 1150px;
      margin: 24px auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .panel {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 24px;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0;
      font-size: 16px;
    }

    .summary-line.total {
      font-size: 22px;
      font-weight: bold;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--borde);
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1px solid var(--borde);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }

    .form-group textarea {
      min-height: 95px;
      resize: vertical;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }

    #store-cart-list:empty::before {
      content: "Tu carrito está vacío.";
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-wrap">
        <h1>Carrito Ding-Dong</h1>
        <p>Revisa tus productos y finaliza tu compra con Wompi.</p>
      </div>

      <div class="top-actions">
        <span>Productos:</span>
        <span id="store-cart-count" class="badge">0</span>
        <a href="/index.html" class="btn btn-secondary">Seguir comprando</a>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Detalle del carrito</h2>
      <div id="store-cart-list"></div>
    </section>

    <aside class="panel">
      <h2>Resumen de compra</h2>

      <div class="summary-line">
        <span>Subtotal</span>
        <strong id="store-subtotal">$0</strong>
      </div>

      <div class="summary-line">
        <span>Envío</span>
        <strong id="store-shipping">$0</strong>
      </div>

      <div class="summary-line total">
        <span>Total</span>
        <strong id="store-total">$0</strong>
      </div>

      <div style="margin-top:24px;">
        <div class="form-group">
          <label for="customer-name">Nombre del comprador</label>
          <input type="text" id="customer-name" placeholder="Tu nombre completo" />
        </div>

        <div class="form-group">
          <label for="customer-phone">Celular</label>
          <input type="tel" id="customer-phone" placeholder="Ej. 3136254423" />
        </div>

        <div class="form-group">
          <label for="customer-address">Dirección de envío</label>
          <textarea id="customer-address" placeholder="Escribe tu dirección completa de entrega"></textarea>
        </div>

        <p class="helper">
          El valor del envío puede ajustarse después según destino, volumen o peso del pedido.
        </p>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
        <button id="pay-store-cart" class="btn btn-primary" type="button">
          Pagar carrito
        </button>

        <button id="clear-store-cart" class="btn btn-danger" type="button">
          Vaciar carrito
        </button>
      </div>
    </aside>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="https://checkout.wompi.co/widget.js"></script>
  <script src="/js/store-checkout.js"></script>
</body>
</html>
