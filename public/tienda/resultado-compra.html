<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado de compra | Ding-Dong</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 50px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      text-align: center;
    }

    .icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin: 8px;
    }

    .btn-primary { background: #2e7d32; color: #fff; }
    .btn-secondary { background: #455a64; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">✓</div>
      <h1>Compra registrada</h1>
      <p>Si tu pago fue aprobado, tu orden quedará confirmada automáticamente.</p>
      <p>Puedes revisar el estado de tu compra en tu panel o contactarnos si necesitas soporte.</p>

      <div style="margin-top:24px;">
        <a href="/index.html" class="btn btn-primary">Volver a la tienda</a>
        <a href="/tienda/carrito.html" class="btn btn-secondary">Volver al carrito</a>
      </div>
    </div>
  </div>
</body>
</html>
