<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar certificado | Ding Dong</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f8f6; color: #1f2937; }
    .container { max-width: 760px; margin: 50px auto; padding: 20px; }
    .card { background: #fff; border-radius: 18px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; color: #2e7d32; }
    .ok { color: #2e7d32; font-weight: bold; }
    .bad { color: #c62828; font-weight: bold; }
    .line { margin: 10px 0; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Verificación de certificado</h1>
      <div id="result">Validando certificado...</div>
    </div>
  </div>

  <script src="./js/firebase-config.js"></script>
  <script>
    async function verifyCertificate() {
      const result = document.getElementById("result");
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code") || "";

      if (!code) {
        result.innerHTML = '<p class="bad">No se encontró código de verificación.</p>';
        return;
      }

      try {
        const snap = await db.collection("certificados")
          .where("codigoVerificacion", "==", code)
          .limit(1)
          .get();

        if (snap.empty) {
          result.innerHTML = '<p class="bad">Certificado no válido o no encontrado.</p>';
          return;
        }

        const doc = snap.docs[0].data();

        result.innerHTML = `
          <p class="ok">Certificado válido</p>
          <p class="line"><strong>Estudiante:</strong> ${doc.nombreEstudiante || "-"}</p>
          <p class="line"><strong>Curso:</strong> ${doc.tituloCurso || "-"}</p>
          <p class="line"><strong>Código:</strong> ${doc.codigoVerificacion || "-"}</p>
        `;
      } catch (error) {
        console.error(error);
        result.innerHTML = '<p class="bad">Error validando el certificado.</p>';
      }
    }

    window.addEventListener("DOMContentLoaded", verifyCertificate);
  </script>
</body>
</html>
