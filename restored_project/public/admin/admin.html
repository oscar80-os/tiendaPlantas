<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin cursos</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<style>body{font-family:Arial,sans-serif;background:#f6f8f6;margin:0}.wrap{max-width:1100px;margin:24px auto;padding:0 20px}.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:10px}button{padding:10px 14px;border:none;border-radius:10px;background:#2e7d32;color:#fff;cursor:pointer;margin-top:10px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #eee}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap" id="admin-app"><div class="card"><h1>Administrador de cursos</h1><p>Solo usuarios con <code>rol: admin</code> en Firestore pueden usar esta pantalla.</p><button onclick="adminLogout()">Cerrar sesión</button></div><div class="grid"><div class="card"><h2>Nuevo curso</h2><form id="course-form" onsubmit="event.preventDefault(); saveCourse();"><input id="title" placeholder="Título"><textarea id="shortDescription" placeholder="Descripción corta"></textarea><textarea id="longDescription" placeholder="Descripción completa"></textarea><input id="thumbnailUrl" placeholder="URL miniatura"><input id="videoUrl" placeholder="URL del video"><input id="price" type="number" placeholder="Precio en COP"><label><input id="activo" type="checkbox" checked> Activo</label><button type="submit">Guardar curso</button></form></div><div class="card"><h2>Cursos cargados</h2><div id="courses-list"></div></div></div></div><script src="../js/admin.js"></script></body></html>
